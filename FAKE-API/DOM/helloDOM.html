<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="titulo">Bem Vindo</h1>

    <p>Hello DOM JS</p>

    <button onclick="saudacao();">Click on Me</button><br>
    <button ondblclick="mouseClicadoDuasVezes();">Click on Me 2</button><br>
    <button onmousedown="saudacao();">Click on Me</button><br>
    <button onmouseup="saudacao();">Click on Me</button><br>
    <button onmouseover="saudacaoLegal();">Passe o Mouse</button>

    <script>
        alert(`Titulo: ${document.getElementById("titulo").textContent}`);

        function saudacao() {
             alert("Hello World!");
        }
        function saudacaoLegal(){
            alert("Ola amigo!");
        }
        function mouseClicadoDuasVezes(){
            alert("Mouse Clicado Duas Vezes!");
        }
    </script>

</body>
    
</html>
